version: '3.8'

# Override for development
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      NUM_WORKERS: 1
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run dev

  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  nginx:
    volumes:
      - ./nginx.dev.conf:/etc/nginx/nginx.conf:ro